<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Admin Sections</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">Debug Admin Panel Sections</h1>
        
        <!-- Test Buttons -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <button onclick="testNewsSection()" class="bg-blue-600 text-white p-4 rounded-lg hover:bg-blue-700">
                <i class="fas fa-newspaper text-xl mb-2"></i>
                <div>Test News Section</div>
            </button>
            
            <button onclick="testCategoriesSection()" class="bg-purple-600 text-white p-4 rounded-lg hover:bg-purple-700">
                <i class="fas fa-tags text-xl mb-2"></i>
                <div>Test Categories</div>
            </button>
            
            <button onclick="testCommentsSection()" class="bg-yellow-600 text-white p-4 rounded-lg hover:bg-yellow-700">
                <i class="fas fa-comments text-xl mb-2"></i>
                <div>Test Comments</div>
            </button>
            
            <button onclick="testAuthorsSection()" class="bg-green-600 text-white p-4 rounded-lg hover:bg-green-700">
                <i class="fas fa-users text-xl mb-2"></i>
                <div>Test Authors</div>
            </button>
        </div>
        
        <!-- Results -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-lg font-semibold mb-4">Test Results</h2>
            <div id="testResults"></div>
        </div>
        
        <!-- Mock Admin Panel Structure -->
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-lg font-semibold mb-4">Mock Admin Panel Sections</h2>
            
            <!-- News Section -->
            <div id="newsSection" class="mb-8 hidden">
                <h3 class="text-md font-semibold mb-4">Kelola Berita</h3>
                <div class="mb-4 flex gap-4">
                    <input type="text" id="newsSearch" placeholder="Cari berita..." 
                           class="px-4 py-2 border border-gray-300 rounded-lg">
                    <select id="newsStatusFilter" class="px-4 py-2 border border-gray-300 rounded-lg">
                        <option value="">Semua Status</option>
                        <option value="publish">Published</option>
                        <option value="draft">Draft</option>
                        <option value="archived">Archived</option>
                    </select>
                </div>
                <div id="newsTable" class="border rounded-lg p-4">
                    <!-- News table will be loaded here -->
                </div>
            </div>
            
            <!-- Categories Section -->
            <div id="categoriesSection" class="mb-8 hidden">
                <h3 class="text-md font-semibold mb-4">Kategori</h3>
                <div id="categoriesTable" class="border rounded-lg p-4">
                    <!-- Categories table will be loaded here -->
                </div>
            </div>
            
            <!-- Comments Section -->
            <div id="commentsSection" class="mb-8 hidden">
                <h3 class="text-md font-semibold mb-4">Komentar</h3>
                <div class="mb-4">
                    <select id="commentsStatusFilter" class="px-4 py-2 border border-gray-300 rounded-lg">
                        <option value="">Semua Status</option>
                        <option value="pending">Pending</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>
                <div id="commentsTable" class="border rounded-lg p-4">
                    <!-- Comments table will be loaded here -->
                </div>
            </div>
            
            <!-- Authors Section -->
            <div id="authorsSection" class="mb-8 hidden">
                <h3 class="text-md font-semibold mb-4">Penulis</h3>
                <div id="authorsTable" class="border rounded-lg p-4">
                    <!-- Authors table will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        function addResult(test, success, message, details = '') {
            const resultsDiv = document.getElementById('testResults');
            const resultDiv = document.createElement('div');
            resultDiv.className = `p-4 mb-4 rounded-lg ${success ? 'bg-green-100 border border-green-200' : 'bg-red-100 border border-red-200'}`;
            
            resultDiv.innerHTML = `
                <div class="flex items-center justify-between">
                    <div>
                        <div class="font-semibold ${success ? 'text-green-800' : 'text-red-800'}">
                            ${test}: ${success ? 'SUCCESS' : 'FAILED'}
                        </div>
                        <div class="text-sm ${success ? 'text-green-600' : 'text-red-600'} mt-1">
                            ${message}
                        </div>
                        ${details ? `<div class="text-xs text-gray-600 mt-2">${details}</div>` : ''}
                    </div>
                    <i class="fas fa-${success ? 'check-circle text-green-500' : 'times-circle text-red-500'} text-xl"></i>
                </div>
            `;
            resultsDiv.appendChild(resultDiv);
        }

        async function testNewsSection() {
            try {
                // Show section
                document.getElementById('newsSection').classList.remove('hidden');
                
                // Test API
                const response = await fetch('../api/get_news.php?limit=10');
                const result = await response.json();
                
                if (result.success && result.data) {
                    addResult('News API', true, `${result.data.length} berita loaded`);
                    
                    // Load into table
                    const container = document.getElementById('newsTable');
                    if (result.data.length > 0) {
                        container.innerHTML = `
                            <div class="overflow-x-auto">
                                <table class="min-w-full divide-y divide-gray-200">
                                    <thead class="bg-gray-50">
                                        <tr>
                                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Judul</th>
                                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Kategori</th>
                                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Views</th>
                                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody class="bg-white divide-y divide-gray-200">
                                        ${result.data.slice(0, 5).map(news => `
                                            <tr>
                                                <td class="px-4 py-2 text-sm text-gray-900 max-w-xs truncate">${news.judul}</td>
                                                <td class="px-4 py-2 text-sm text-gray-500">${news.kategori}</td>
                                                <td class="px-4 py-2 text-sm text-gray-500">${news.views}</td>
                                                <td class="px-4 py-2">
                                                    <span class="px-2 py-1 text-xs font-medium bg-green-100 text-green-800 rounded-full">
                                                        ${news.status || 'PUBLISH'}
                                                    </span>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        `;
                    } else {
                        container.innerHTML = '<div class="text-gray-500 text-center py-4">No news found</div>';
                    }
                } else {
                    addResult('News API', false, result.message || 'Unknown error');
                }
            } catch (error) {
                addResult('News API', false, error.message);
            }
        }

        async function testCategoriesSection() {
            try {
                document.getElementById('categoriesSection').classList.remove('hidden');
                
                const response = await fetch('../api/get_categories.php');
                const result = await response.json();
                
                if (result.success && result.data) {
                    addResult('Categories API', true, `${result.data.length} kategori loaded`);
                    
                    const container = document.getElementById('categoriesTable');
                    if (result.data.length > 0) {
                        container.innerHTML = `
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                ${result.data.map(cat => `
                                    <div class="border rounded-lg p-4">
                                        <h4 class="font-semibold">${cat.nama_kategori}</h4>
                                        <p class="text-sm text-gray-500">Slug: ${cat.slug_kategori}</p>
                                        <p class="text-sm text-gray-500">Berita: ${cat.jumlah_berita || 0}</p>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    } else {
                        container.innerHTML = '<div class="text-gray-500 text-center py-4">No categories found</div>';
                    }
                } else {
                    addResult('Categories API', false, result.message || 'Unknown error');
                }
            } catch (error) {
                addResult('Categories API', false, error.message);
            }
        }

        async function testCommentsSection() {
            try {
                document.getElementById('commentsSection').classList.remove('hidden');
                
                const response = await fetch('../api/get_comments.php?limit=10');
                const result = await response.json();
                
                if (result.success && result.data) {
                    addResult('Comments API', true, `${result.data.length} komentar loaded`);
                    
                    const container = document.getElementById('commentsTable');
                    if (result.data.length > 0) {
                        container.innerHTML = `
                            <div class="space-y-4">
                                ${result.data.slice(0, 5).map(comment => `
                                    <div class="border rounded-lg p-4">
                                        <div class="flex justify-between items-start mb-2">
                                            <h4 class="font-semibold">${comment.nama_pengunjung}</h4>
                                            <span class="px-2 py-1 text-xs font-medium rounded-full ${getStatusClass(comment.status)}">
                                                ${comment.status.toUpperCase()}
                                            </span>
                                        </div>
                                        <p class="text-sm text-gray-600 mb-2">${comment.isi_komentar_short || comment.isi_komentar}</p>
                                        <p class="text-xs text-gray-500">Berita: ${comment.judul_berita || 'Unknown'}</p>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    } else {
                        container.innerHTML = '<div class="text-gray-500 text-center py-4">No comments found</div>';
                    }
                } else {
                    addResult('Comments API', false, result.message || 'Unknown error');
                }
            } catch (error) {
                addResult('Comments API', false, error.message);
            }
        }

        async function testAuthorsSection() {
            try {
                document.getElementById('authorsSection').classList.remove('hidden');
                
                const response = await fetch('../api/get_authors.php');
                const result = await response.json();
                
                if (result.success && result.data) {
                    addResult('Authors API', true, `${result.data.length} penulis loaded`);
                    
                    const container = document.getElementById('authorsTable');
                    if (result.data.length > 0) {
                        container.innerHTML = `
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                ${result.data.map(author => `
                                    <div class="border rounded-lg p-4">
                                        <h4 class="font-semibold">${author.nama_lengkap}</h4>
                                        <p class="text-sm text-gray-500">Username: ${author.username}</p>
                                        <p class="text-sm text-gray-500">Email: ${author.email || 'No email'}</p>
                                        <p class="text-sm text-gray-500">Total Berita: ${author.total_berita}</p>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    } else {
                        container.innerHTML = '<div class="text-gray-500 text-center py-4">No authors found</div>';
                    }
                } else {
                    addResult('Authors API', false, result.message || 'Unknown error');
                }
            } catch (error) {
                addResult('Authors API', false, error.message);
            }
        }
        
        function getStatusClass(status) {
            switch(status) {
                case 'approved': return 'bg-green-100 text-green-800';
                case 'pending': return 'bg-yellow-100 text-yellow-800';
                case 'rejected': return 'bg-red-100 text-red-800';
                default: return 'bg-gray-100 text-gray-800';
            }
        }
        
        // Auto test all on load
        document.addEventListener('DOMContentLoaded', async () => {
            addResult('System', true, 'Starting debug tests...', new Date().toLocaleString());
            
            await new Promise(resolve => setTimeout(resolve, 500));
            await testNewsSection();
            
            await new Promise(resolve => setTimeout(resolve, 500));
            await testCategoriesSection();
            
            await new Promise(resolve => setTimeout(resolve, 500));
            await testCommentsSection();
            
            await new Promise(resolve => setTimeout(resolve, 500));
            await testAuthorsSection();
            
            addResult('System', true, 'All debug tests completed!');
        });
    </script>
</body>
</html>
