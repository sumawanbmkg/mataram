<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Admin Panel Complete - BMKG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center">Test Admin Panel Complete</h1>
        
        <!-- Dashboard Stats Test -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">📊 Dashboard Stats Test</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                <div class="bg-blue-50 p-4 rounded-lg text-center">
                    <div class="text-2xl font-bold text-blue-600" id="testTotalNews">0</div>
                    <div class="text-sm text-gray-600">Total Berita</div>
                </div>
                <div class="bg-green-50 p-4 rounded-lg text-center">
                    <div class="text-2xl font-bold text-green-600" id="testTotalViews">0</div>
                    <div class="text-sm text-gray-600">Total Views</div>
                </div>
                <div class="bg-yellow-50 p-4 rounded-lg text-center">
                    <div class="text-2xl font-bold text-yellow-600" id="testTotalCategories">0</div>
                    <div class="text-sm text-gray-600">Kategori</div>
                </div>
                <div class="bg-purple-50 p-4 rounded-lg text-center">
                    <div class="text-2xl font-bold text-purple-600" id="testTotalComments">0</div>
                    <div class="text-sm text-gray-600">Komentar</div>
                </div>
            </div>
            <button onclick="testDashboardStats()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                Test Dashboard Stats
            </button>
        </div>
        
        <!-- Recent News Test -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">📰 Recent News Test</h2>
            <button onclick="testRecentNews()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 mb-4">
                Test Recent News
            </button>
            <div id="testRecentNews" class="border rounded p-4 bg-gray-50">
                <!-- Recent news will be loaded here -->
            </div>
        </div>
        
        <!-- Authors Test -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">👥 Authors Test</h2>
            <button onclick="testAuthors()" class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700 mb-4">
                Test Authors
            </button>
            <div id="testAuthors" class="border rounded p-4 bg-gray-50 overflow-auto">
                <!-- Authors will be loaded here -->
            </div>
        </div>
        
        <!-- Featured News Test -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">⭐ Featured News Test</h2>
            <div class="flex gap-4 mb-4">
                <button onclick="testCurrentFeatured()" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
                    Test Current Featured
                </button>
                <button onclick="testFeaturedList()" class="bg-yellow-600 text-white px-4 py-2 rounded hover:bg-yellow-700">
                    Test Featured List
                </button>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div>
                    <h3 class="font-semibold mb-2">Current Featured:</h3>
                    <div id="testCurrentFeatured" class="border rounded p-4 bg-gray-50">
                        <!-- Current featured will be loaded here -->
                    </div>
                </div>
                <div>
                    <h3 class="font-semibold mb-2">Featured List:</h3>
                    <div id="testFeaturedList" class="border rounded p-4 bg-gray-50 overflow-auto max-h-96">
                        <!-- Featured list will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- API Test Results -->
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-xl font-semibold mb-4">🔧 API Test Results</h2>
            <div id="apiResults" class="bg-black text-green-400 p-4 rounded font-mono text-sm h-64 overflow-auto">
                <!-- API results will appear here -->
            </div>
        </div>
    </div>

    <script>
        // Console override for display
        const originalLog = console.log;
        const originalError = console.error;
        const resultsDiv = document.getElementById('apiResults');
        
        function addToResults(message, type = 'log') {
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'text-red-400' : 'text-green-400';
            resultsDiv.innerHTML += `<div class="${color}">[${timestamp}] ${message}</div>`;
            resultsDiv.scrollTop = resultsDiv.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addToResults(args.join(' '), 'log');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addToResults(args.join(' '), 'error');
        };
        
        // Test Functions
        async function testDashboardStats() {
            console.log('Testing Dashboard Stats...');
            try {
                // Test news stats
                const newsResponse = await fetch('../api/manage_news.php?action=stats');
                const newsResult = await newsResponse.json();
                console.log('News stats:', newsResult);
                
                // Test categories
                const categoriesResponse = await fetch('../api/get_categories.php');
                const categoriesResult = await categoriesResponse.json();
                console.log('Categories:', categoriesResult);
                
                // Update display
                document.getElementById('testTotalNews').textContent = newsResult.success ? (newsResult.data?.total_news || 0) : 0;
                document.getElementById('testTotalViews').textContent = newsResult.success ? (newsResult.data?.total_views || 0) : 0;
                document.getElementById('testTotalCategories').textContent = categoriesResult.success ? (categoriesResult.data?.length || 0) : 0;
                document.getElementById('testTotalComments').textContent = 0;
                
                console.log('✅ Dashboard stats test completed');
            } catch (error) {
                console.error('❌ Dashboard stats test failed:', error);
            }
        }
        
        async function testRecentNews() {
            console.log('Testing Recent News...');
            try {
                const response = await fetch('../api/get_news.php?limit=5&sort=newest');
                const result = await response.json();
                console.log('Recent news:', result);
                
                const container = document.getElementById('testRecentNews');
                
                if (result.success && result.data && result.data.length > 0) {
                    container.innerHTML = result.data.map(news => `
                        <div class="flex items-center space-x-4 p-3 border-b last:border-b-0">
                            <img src="../${news.gambar_url}" alt="${news.judul}" 
                                 class="w-12 h-12 object-cover rounded"
                                 onerror="this.src='../images/placeholder-news.jpg'">
                            <div class="flex-1">
                                <div class="font-medium text-sm">${news.judul}</div>
                                <div class="text-xs text-gray-500">${news.kategori} • ${news.views} views</div>
                            </div>
                            <div class="text-xs px-2 py-1 rounded ${news.featured ? 'bg-red-100 text-red-800' : 'bg-gray-100 text-gray-800'}">
                                ${news.featured ? 'UTAMA' : news.status.toUpperCase()}
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="text-center py-4 text-gray-500">Tidak ada berita</div>';
                }
                
                console.log('✅ Recent news test completed');
            } catch (error) {
                console.error('❌ Recent news test failed:', error);
            }
        }
        
        async function testAuthors() {
            console.log('Testing Authors...');
            try {
                const response = await fetch('../api/get_authors.php');
                const result = await response.json();
                console.log('Authors:', result);
                
                const container = document.getElementById('testAuthors');
                
                if (result.success && result.data && result.data.length > 0) {
                    container.innerHTML = `
                        <table class="min-w-full text-sm">
                            <thead class="bg-gray-100">
                                <tr>
                                    <th class="px-4 py-2 text-left">Nama</th>
                                    <th class="px-4 py-2 text-left">Username</th>
                                    <th class="px-4 py-2 text-left">Total Berita</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${result.data.map(author => `
                                    <tr class="border-b">
                                        <td class="px-4 py-2">
                                            <div class="flex items-center">
                                                <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white text-xs mr-2">
                                                    ${author.nama_lengkap.charAt(0).toUpperCase()}
                                                </div>
                                                ${author.nama_lengkap}
                                            </div>
                                        </td>
                                        <td class="px-4 py-2">${author.username}</td>
                                        <td class="px-4 py-2">${author.total_berita}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                } else {
                    container.innerHTML = '<div class="text-center py-4 text-gray-500">Tidak ada penulis</div>';
                }
                
                console.log('✅ Authors test completed');
            } catch (error) {
                console.error('❌ Authors test failed:', error);
            }
        }
        
        async function testCurrentFeatured() {
            console.log('Testing Current Featured News...');
            try {
                const response = await fetch('../api/get_news.php?featured=true&limit=1');
                const result = await response.json();
                console.log('Current featured:', result);
                
                const container = document.getElementById('testCurrentFeatured');
                
                if (result.success && result.data && result.data.length > 0) {
                    const news = result.data[0];
                    container.innerHTML = `
                        <div class="border border-red-200 bg-red-50 rounded p-3">
                            <div class="flex items-start space-x-3">
                                <img src="../${news.gambar_url}" alt="${news.judul}" 
                                     class="w-16 h-16 object-cover rounded"
                                     onerror="this.src='../images/placeholder-news.jpg'">
                                <div class="flex-1">
                                    <span class="bg-red-600 text-white px-2 py-1 rounded text-xs font-semibold mb-2 inline-block">
                                        BERITA UTAMA
                                    </span>
                                    <h4 class="font-semibold text-sm mb-1">${news.judul}</h4>
                                    <div class="text-xs text-gray-600">
                                        ${news.kategori} • ${news.views} views
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    container.innerHTML = '<div class="text-center py-4 text-gray-500">Belum ada berita utama</div>';
                }
                
                console.log('✅ Current featured test completed');
            } catch (error) {
                console.error('❌ Current featured test failed:', error);
            }
        }
        
        async function testFeaturedList() {
            console.log('Testing Featured News List...');
            try {
                const response = await fetch('../api/get_news.php?limit=10');
                const result = await response.json();
                console.log('Featured list:', result);
                
                const container = document.getElementById('testFeaturedList');
                
                if (result.success && result.data && result.data.length > 0) {
                    container.innerHTML = result.data.map(news => `
                        <div class="flex items-center justify-between p-2 border-b last:border-b-0 hover:bg-gray-50">
                            <div class="flex items-center space-x-2 flex-1">
                                <img src="../${news.gambar_url}" alt="${news.judul}" 
                                     class="w-8 h-8 object-cover rounded"
                                     onerror="this.src='../images/placeholder-news.jpg'">
                                <div class="flex-1 min-w-0">
                                    <div class="text-sm font-medium truncate">${news.judul}</div>
                                    <div class="text-xs text-gray-500">${news.kategori}</div>
                                </div>
                            </div>
                            <div class="flex items-center space-x-2">
                                <span class="text-xs px-2 py-1 rounded ${news.featured ? 'bg-red-100 text-red-800' : 'bg-gray-100 text-gray-800'}">
                                    ${news.featured ? 'UTAMA' : 'BIASA'}
                                </span>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="text-center py-4 text-gray-500">Tidak ada berita</div>';
                }
                
                console.log('✅ Featured list test completed');
            } catch (error) {
                console.error('❌ Featured list test failed:', error);
            }
        }
        
        // Auto-run tests on load
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 Admin Panel Test Suite Started');
            console.log('Running automatic tests...');
            
            setTimeout(() => {
                testDashboardStats();
            }, 500);
            
            setTimeout(() => {
                testRecentNews();
            }, 1000);
            
            setTimeout(() => {
                testAuthors();
            }, 1500);
            
            setTimeout(() => {
                testCurrentFeatured();
            }, 2000);
        });
    </script>
</body>
</html>
