<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test All Admin Sections - BMKG News</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-8">
        <h1 class="text-2xl font-bold mb-6">Test All Admin Sections</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <button onclick="testDashboard()" class="bg-blue-600 text-white p-4 rounded-lg hover:bg-blue-700">
                <i class="fas fa-tachometer-alt text-2xl mb-2"></i>
                <div>Test Dashboard</div>
            </button>
            
            <button onclick="testNews()" class="bg-green-600 text-white p-4 rounded-lg hover:bg-green-700">
                <i class="fas fa-newspaper text-2xl mb-2"></i>
                <div>Test Kelola Berita</div>
            </button>
            
            <button onclick="testCategories()" class="bg-purple-600 text-white p-4 rounded-lg hover:bg-purple-700">
                <i class="fas fa-tags text-2xl mb-2"></i>
                <div>Test Kategori</div>
            </button>
            
            <button onclick="testComments()" class="bg-yellow-600 text-white p-4 rounded-lg hover:bg-yellow-700">
                <i class="fas fa-comments text-2xl mb-2"></i>
                <div>Test Komentar</div>
            </button>
        </div>
        
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-lg font-semibold mb-4">Test Results</h2>
            <div id="testResults" class="space-y-4">
                <!-- Results will appear here -->
            </div>
        </div>
    </div>

    <script>
        function addResult(test, success, data, details = '') {
            const resultsDiv = document.getElementById('testResults');
            const resultDiv = document.createElement('div');
            resultDiv.className = `p-4 rounded-lg ${success ? 'bg-green-100 border border-green-200' : 'bg-red-100 border border-red-200'}`;
            
            const summary = typeof data === 'object' && data.data ? 
                `${data.data.length} items loaded` : 
                (typeof data === 'string' ? data : JSON.stringify(data));
            
            resultDiv.innerHTML = `
                <div class="flex items-center justify-between">
                    <div>
                        <div class="font-semibold ${success ? 'text-green-800' : 'text-red-800'}">
                            ${test}: ${success ? 'SUCCESS' : 'FAILED'}
                        </div>
                        <div class="text-sm ${success ? 'text-green-600' : 'text-red-600'} mt-1">
                            ${summary}
                        </div>
                        ${details ? `<div class="text-xs text-gray-600 mt-2">${details}</div>` : ''}
                    </div>
                    <i class="fas fa-${success ? 'check-circle text-green-500' : 'times-circle text-red-500'} text-xl"></i>
                </div>
            `;
            resultsDiv.appendChild(resultDiv);
        }

        async function testDashboard() {
            try {
                // Test news stats
                const newsStatsResponse = await fetch('../api/manage_news.php?action=stats');
                const newsStatsResult = await newsStatsResponse.json();
                
                if (newsStatsResult.success) {
                    addResult('Dashboard - News Stats', true, newsStatsResult, 
                        `Total: ${newsStatsResult.data.total_news}, Views: ${newsStatsResult.data.total_views}`);
                } else {
                    addResult('Dashboard - News Stats', false, newsStatsResult.message);
                }
                
                // Test categories
                const categoriesResponse = await fetch('../api/get_categories.php');
                const categoriesResult = await categoriesResponse.json();
                
                if (categoriesResult.success) {
                    addResult('Dashboard - Categories', true, categoriesResult, 
                        `${categoriesResult.data.length} categories found`);
                } else {
                    addResult('Dashboard - Categories', false, categoriesResult.message);
                }
                
                // Test authors
                const authorsResponse = await fetch('../api/get_authors.php');
                const authorsResult = await authorsResponse.json();
                
                if (authorsResult.success) {
                    addResult('Dashboard - Authors', true, authorsResult, 
                        `${authorsResult.data.length} authors found`);
                } else {
                    addResult('Dashboard - Authors', false, authorsResult.message);
                }
                
                // Test recent news
                const recentNewsResponse = await fetch('../api/get_news.php?limit=5&sort=newest');
                const recentNewsResult = await recentNewsResponse.json();
                
                if (recentNewsResult.success) {
                    addResult('Dashboard - Recent News', true, recentNewsResult, 
                        `${recentNewsResult.data.length} recent news loaded`);
                } else {
                    addResult('Dashboard - Recent News', false, recentNewsResult.message);
                }
                
            } catch (error) {
                addResult('Dashboard Test', false, error.message);
            }
        }

        async function testNews() {
            try {
                const response = await fetch('../api/get_news.php?limit=20');
                const result = await response.json();
                
                if (result.success) {
                    addResult('Kelola Berita', true, result, 
                        `${result.data.length} berita loaded, pagination: ${result.pagination ? 'yes' : 'no'}`);
                } else {
                    addResult('Kelola Berita', false, result.message);
                }
            } catch (error) {
                addResult('Kelola Berita', false, error.message);
            }
        }

        async function testCategories() {
            try {
                const response = await fetch('../api/get_categories.php');
                const result = await response.json();
                
                if (result.success) {
                    const details = result.data.map(cat => 
                        `${cat.nama_kategori} (${cat.jumlah_berita || 0} berita)`
                    ).join(', ');
                    
                    addResult('Kategori', true, result, details);
                } else {
                    addResult('Kategori', false, result.message);
                }
            } catch (error) {
                addResult('Kategori', false, error.message);
            }
        }

        async function testComments() {
            try {
                const response = await fetch('../api/get_comments.php?limit=20');
                const result = await response.json();
                
                if (result.success) {
                    const statusCounts = {};
                    result.data.forEach(comment => {
                        statusCounts[comment.status] = (statusCounts[comment.status] || 0) + 1;
                    });
                    
                    const details = Object.entries(statusCounts)
                        .map(([status, count]) => `${status}: ${count}`)
                        .join(', ');
                    
                    addResult('Komentar', true, result, 
                        `${result.data.length} komentar loaded (${details})`);
                } else {
                    addResult('Komentar', false, result.message);
                }
            } catch (error) {
                addResult('Komentar', false, error.message);
            }
        }

        // Auto test all on load
        document.addEventListener('DOMContentLoaded', async () => {
            addResult('System', true, 'Starting comprehensive admin panel test...', new Date().toLocaleString());
            
            await new Promise(resolve => setTimeout(resolve, 500));
            await testDashboard();
            
            await new Promise(resolve => setTimeout(resolve, 500));
            await testNews();
            
            await new Promise(resolve => setTimeout(resolve, 500));
            await testCategories();
            
            await new Promise(resolve => setTimeout(resolve, 500));
            await testComments();
            
            addResult('System', true, 'All tests completed!', 'Check results above');
        });
    </script>
</body>
</html>
