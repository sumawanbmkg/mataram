<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Dashboard - Admin Panel BMKG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100">
    <!-- Sidebar -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-slate-800 text-white transform -translate-x-full lg:translate-x-0 transition-transform z-50">
        <div class="p-4 border-b border-slate-700">
            <div class="flex items-center gap-3">
                <img src="../logo-bmkg.png" alt="BMKG" class="h-10">
                <div>
                    <h1 class="font-bold">Admin Panel</h1>
                    <p class="text-xs text-slate-400">BMKG Mataram</p>
                </div>
            </div>
        </div>
        
        <nav class="p-4">
            <ul class="space-y-2">
                <li>
                    <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-lg bg-blue-600 text-white">
                        <i class="fas fa-home w-5"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="news.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-700 transition">
                        <i class="fas fa-newspaper w-5"></i>
                        <span>Kelola Berita</span>
                    </a>
                </li>
                <li>
                    <a href="news-create.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-700 transition">
                        <i class="fas fa-plus-circle w-5"></i>
                        <span>Tulis Berita</span>
                    </a>
                </li>
                <li id="usersMenu" class="hidden">
                    <a href="users.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-700 transition">
                        <i class="fas fa-users w-5"></i>
                        <span>Kelola User</span>
                    </a>
                </li>
                <li>
                    <a href="profile.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-700 transition">
                        <i class="fas fa-user-cog w-5"></i>
                        <span>Profil & MFA</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-slate-700">
            <button id="logoutBtn" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-red-600 transition w-full">
                <i class="fas fa-sign-out-alt w-5"></i>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- Mobile Menu Toggle -->
    <button id="menuToggle" class="lg:hidden fixed top-4 left-4 z-50 bg-slate-800 text-white p-3 rounded-lg">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Main Content -->
    <main class="lg:ml-64 min-h-screen">
        <!-- Header -->
        <header class="bg-white shadow-sm p-4 flex justify-between items-center">
            <div>
                <h2 class="text-xl font-bold text-gray-800">Dashboard</h2>
                <p class="text-sm text-gray-500">Selamat datang, <span id="userName">Admin</span></p>
            </div>
            <div class="flex items-center gap-4">
                <span id="currentTime" class="text-sm text-gray-500"></span>
                <span id="userRole" class="px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm"></span>
            </div>
        </header>

        <!-- Stats Cards -->
        <div class="p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="bg-white rounded-xl shadow-sm p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Total Berita</p>
                            <p id="totalNews" class="text-3xl font-bold text-gray-800">0</p>
                        </div>
                        <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                            <i class="fas fa-newspaper text-blue-600 text-xl"></i>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Dipublikasi</p>
                            <p id="publishedNews" class="text-3xl font-bold text-green-600">0</p>
                        </div>
                        <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                            <i class="fas fa-check-circle text-green-600 text-xl"></i>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Draft</p>
                            <p id="draftNews" class="text-3xl font-bold text-yellow-600">0</p>
                        </div>
                        <div class="w-12 h-12 bg-yellow-100 rounded-full flex items-center justify-center">
                            <i class="fas fa-edit text-yellow-600 text-xl"></i>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Total Views</p>
                            <p id="totalViews" class="text-3xl font-bold text-purple-600">0</p>
                        </div>
                        <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                            <i class="fas fa-eye text-purple-600 text-xl"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Charts -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                <div class="bg-white rounded-xl shadow-sm p-6">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4">Berita per Bulan</h3>
                    <canvas id="newsChart" height="200"></canvas>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-6">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4">Views per Bulan</h3>
                    <canvas id="viewsChart" height="200"></canvas>
                </div>
            </div>

            <!-- Recent Activity & Top News -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white rounded-xl shadow-sm p-6">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4">Berita Terpopuler</h3>
                    <div id="topNewsList" class="space-y-3">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-6">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4">Aktivitas Terbaru</h3>
                    <div id="activityList" class="space-y-3 max-h-80 overflow-y-auto">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/common.js"></script>
    <script>
        // Check auth
        checkAuth();

        // Update time
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleString('id-ID', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        updateTime();
        setInterval(updateTime, 60000);

        // Load dashboard data
        async function loadDashboard() {
            try {
                const response = await fetchAPI('api/statistics.php?type=dashboard');
                if (response.success) {
                    const data = response.data;
                    
                    // Update stats
                    document.getElementById('totalNews').textContent = data.total_news;
                    document.getElementById('publishedNews').textContent = data.published_news;
                    document.getElementById('draftNews').textContent = data.draft_news;
                    document.getElementById('totalViews').textContent = formatNumber(data.total_views);

                    // Render charts
                    renderNewsChart(data.news_by_month);
                    renderViewsChart(data.views_by_month);

                    // Render top news
                    renderTopNews(data.top_news);

                    // Render activity
                    renderActivity(data.recent_activity);
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num;
        }

        function renderNewsChart(data) {
            const ctx = document.getElementById('newsChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => {
                        const [year, month] = d.month.split('-');
                        return new Date(year, month - 1).toLocaleDateString('id-ID', { month: 'short', year: '2-digit' });
                    }),
                    datasets: [{
                        label: 'Jumlah Berita',
                        data: data.map(d => d.count),
                        backgroundColor: 'rgba(59, 130, 246, 0.8)',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        function renderViewsChart(data) {
            const ctx = document.getElementById('viewsChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => {
                        const [year, month] = d.month.split('-');
                        return new Date(year, month - 1).toLocaleDateString('id-ID', { month: 'short', year: '2-digit' });
                    }),
                    datasets: [{
                        label: 'Views',
                        data: data.map(d => d.count),
                        borderColor: 'rgba(147, 51, 234, 1)',
                        backgroundColor: 'rgba(147, 51, 234, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        function renderTopNews(data) {
            const container = document.getElementById('topNewsList');
            if (!data || data.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-sm">Belum ada data</p>';
                return;
            }
            container.innerHTML = data.slice(0, 5).map((news, i) => `
                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
                    <span class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold text-sm">${i + 1}</span>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-gray-800 truncate">${news.judul}</p>
                        <p class="text-xs text-gray-500">${formatNumber(news.views)} views</p>
                    </div>
                </div>
            `).join('');
        }

        function renderActivity(data) {
            const container = document.getElementById('activityList');
            if (!data || data.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-sm">Belum ada aktivitas</p>';
                return;
            }

            const actionLabels = {
                'login': { icon: 'fa-sign-in-alt', color: 'text-green-600', label: 'Login' },
                'logout': { icon: 'fa-sign-out-alt', color: 'text-gray-600', label: 'Logout' },
                'create': { icon: 'fa-plus', color: 'text-blue-600', label: 'Membuat' },
                'update': { icon: 'fa-edit', color: 'text-yellow-600', label: 'Mengedit' },
                'delete': { icon: 'fa-trash', color: 'text-red-600', label: 'Menghapus' }
            };

            container.innerHTML = data.slice(0, 10).map(activity => {
                const action = actionLabels[activity.action] || { icon: 'fa-circle', color: 'text-gray-600', label: activity.action };
                const time = new Date(activity.created_at).toLocaleString('id-ID', { 
                    day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' 
                });
                return `
                    <div class="flex items-start gap-3 p-3 border-b border-gray-100">
                        <i class="fas ${action.icon} ${action.color} mt-1"></i>
                        <div class="flex-1">
                            <p class="text-sm text-gray-800">
                                <span class="font-medium">${activity.user_name || 'System'}</span>
                                ${action.label} ${activity.entity_name ? `"${activity.entity_name}"` : ''}
                            </p>
                            <p class="text-xs text-gray-500">${time}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Initialize
        loadDashboard();
    </script>
</body>
</html>
