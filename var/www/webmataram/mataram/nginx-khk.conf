# Nginx Configuration untuk Admin Panel KHK
# Tambahkan ke dalam block server {} di konfigurasi nginx Anda
# Lokasi: /etc/nginx/sites-available/webmataram

# ============================================
# COPY BAGIAN INI KE DALAM server { } BLOCK
# ============================================

    # Protect sensitive directories
    location ~ ^/khk/(config|includes|logs|setup)/ {
        deny all;
        return 404;
    }

    # Protect sensitive files
    location ~ ^/khk/.*\.(sql|log|md|env)$ {
        deny all;
        return 404;
    }

    # PHP handling for KHK admin panel
    location ~ ^/khk/.*\.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Static files for KHK
    location /khk/ {
        try_files $uri $uri/ =404;
        
        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
    }

