<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Secure - BMKG Mataram</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-shield-alt text-white text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Secure Login</h2>
            <p class="text-gray-500">BMKG Stasiun Geofisika Mataram</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div id="credential-section">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" id="username" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                <div class="mt-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
            </div>

            <div id="mfa-section" class="hidden border-t pt-4 mt-4">
                <div class="bg-yellow-50 p-3 rounded-lg mb-4 text-xs text-yellow-700 border border-yellow-200">
                    <i class="fas fa-key mr-1"></i> MFA Aktif. Masukkan kode dari aplikasi Authenticator Anda.
                </div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Kode Verifikasi (6 Digit)</label>
                <input type="text" id="otp_code" maxlength="6" class="w-full px-4 py-2 border border-blue-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-center text-2xl tracking-widest outline-none" placeholder="000000">
            </div>

            <button type="submit" id="btn-submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition-all mt-6">
                Login ke Dashboard
            </button>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        let mfaRequired = false;

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const otp_code = document.getElementById('otp_code').value;
            const btn = document.getElementById('btn-submit');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';

            try {
                const response = await fetch('api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, otp_code })
                });

                const result = await response.json();

                if (result.success) {
                    if (result.mfa_required) {
                        // Munculkan input MFA
                        mfaRequired = true;
                        document.getElementById('mfa-section').classList.remove('hidden');
                        document.getElementById('credential-section').classList.add('opacity-50');
                        document.getElementById('username').readOnly = true;
                        document.getElementById('password').readOnly = true;
                        document.getElementById('otp_code').focus();
                        btn.innerHTML = 'Verifikasi & Masuk';
                        btn.disabled = false;
                    } else {
                        // Login Berhasil
                        window.location.href = 'news.html';
                    }
                } else {
                    alert(result.message);
                    btn.innerHTML = 'Login ke Dashboard';
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Terjadi kesalahan koneksi ke server.');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
